<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-main.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BinQasim Technical Services CO.LLC</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Google Translate: hidden widget (we drive it from our LanguageSelector) -->
    <div id="google_translate_element" class="google-translate-hidden" aria-hidden="true"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,ar',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
          },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
